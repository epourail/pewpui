version: '3.7'

services:
  api-php:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: api_pewpui_php
    networks:
      - back

  bo-nginx:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: bo_pewpui_nginx
    depends_on:
      - api-php
    ports: 
      - 8881:80
    networks:
      - front
      - back

  portainer:
    image: portainer/portainer
    networks:
      - back
      - front
    volumes:
      - ./portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9000:9000"

networks:
  front:
  back:
